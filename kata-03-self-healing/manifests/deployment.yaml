apiVersion: apps/v1
kind: Deployment
metadata:
  name: unstable-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: unstable
  template:
    metadata:
      labels:
        app: unstable
    spec:
      containers:
        - name: app
          image: registry.k8s.io/e2e-test-images/agnhost:2.45
          args:
            - netexec
            - --http-port=8080
          ports:
            - containerPort: 8080